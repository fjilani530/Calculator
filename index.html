<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KG Coding Calculator</title>
     <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="calculator">
        <input type="text" id="display" readonly>
        <div class="button-grid">
            <!-- Row 1 -->
            <button class="btn-clear">C</button>
            <button class="btn-operator">/</button>
            <button class="btn-operator">*</button>
            <button class="btn-operator">-</button>

            <!-- Row 2 -->
            <button class="btn-number">7</button>
            <button class="btn-number">8</button>
            <button class="btn-number">9</button>
            <button class="btn-operator">+</button>

            <!-- Row 3 -->
            <button class="btn-number">4</button>
            <button class="btn-number">5</button>
            <button class="btn-number">6</button>
            <button class="btn btn-operator" id="backspace">⌫</button>
            <!-- empty cell for alignment -->

            <!-- Row 4 -->
            <button class="btn-number">1</button>
            <button class="btn-number">2</button>
            <button class="btn-number">3</button>
            <button class="btn btn-equals" data-action="equals">=</button> <!-- empty cell for alignment -->

            <!-- Row 5 -->
            <!-- Last row: Backspace, 0, ., = -->
            <button class="btn btn-number btn-zero" data-num="0">0</button>
            <button class="btn btn-decimal" data-num=".">.</button>

            <div></div>
            <!-- empty cell for alignment -->
        </div>
    </div>
    <script src="script.js"></script>

</body>

</html>
